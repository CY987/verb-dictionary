<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>西班牙文動詞變化</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center py-10">

    <div class="w-full max-w-4xl bg-white p-6 rounded-xl shadow-md">

        <!-- Ar / Er / Ir -->
        <div class="grid grid-cols-2 gap-4 mb-6">

            <div>
                <label class="block mb-2 font-bold text-gray-500">
                    Type
                </label>

                <select id="type-select" class="w-full border-2 border-black rounded-lg px-4 py-3">

                    <option value="">All</option>
                    <option value="ar">Ar</option>
                    <option value="er">Er</option>
                    <option value="ir">Ir</option>

                </select>
            </div>

            <div>

                <label class="block mb-2 font-bold text-gray-500">
                    Tense
                </label>

                <select id="tense-select" class="w-full border-2 border-black rounded-lg px-4 py-3">
                </select>

            </div>

        </div>

        <!-- 搜尋欄 -->
        <div class="mb-6">

            <input id="word-search" type="text" placeholder="搜尋全部動詞或英文意思，例如 tomar、drink" class="
                    w-full
                    px-4
                    py-3
                    border-2
                    border-black
                    rounded-lg
                    text-lg
            
                    disabled:cursor-not-allowed
                    focus:outline-none
                    focus:ring-2
                    focus:ring-gray-400
                ">

        </div>

        <!-- 單字列表／目前單字 -->
        <div class="
            border-4
            border-black
            h-40
            p-4
            flex
            items-center
            justify-center
            mb-8
            rounded-lg
            bg-gray-50
        ">

            <!-- 單字列表 -->
            <div id="word-list-container" class="w-full h-full overflow-y-auto flex items-start justify-center">

                <div id="word-list" class="grid grid-cols-3 gap-2 w-full text-center">
                </div>

            </div>

            <!-- 選取的單字 -->
            <div id="selected-word" class="hidden font-bold text-center break-words"
                style="font-size: clamp(1.3rem, 3vw, 2rem);">
                顯示選取的單字
            </div>

        </div>

        <!-- 一般六人稱結果 -->
        <divid="normal-result" class="grid grid-cols-2 text-center font-bold"
            style="font-size: clamp(1.2rem, 3vw, 2.25rem);">

            <!-- yo -->
            <div class="
                border-r-4
                border-b-4
                border-black
                py-8
                flex
                items-center
                justify-center
                min-h-[140px]
                break-words leading-tight px-2
            ">
                <div id="p1" class="break-words leading-tight px-2">yo</div>
            </div>

            <!-- nosotros -->
            <div class="
                border-b-4
                border-black
                py-8
                flex
                items-center
                justify-center
                min-h-[140px]
                break-words leading-tight px-2
            ">
                <div id="p4" class="break-words leading-tight px-2">nosotros</div>
            </div>

            <!-- tú -->
            <div class="
                border-r-4
                border-b-4
                border-black
                py-8
                flex
                items-center
                justify-center
                min-h-[140px]
                break-words leading-tight px-2
            ">
                <div id="p2" class="break-words leading-tight px-2">tú</div>
            </div>

            <!-- vosotros -->
            <div class="
                border-b-4
                border-black
                py-8
                flex
                items-center
                justify-center
                min-h-[140px]
                break-words leading-tight px-2
            ">
                <div id="p5" class="break-words leading-tight px-2">vosotros</div>
            </div>

            <!-- él / ella / usted -->
            <div class="
                border-r-4
                border-black
                py-8
                px-2
                flex
                items-center
                justify-center
                min-h-[140px]
                break-words leading-tight px-2
            ">

                <div id="p3" class="flex flex-col gap-1 
                break-words leading-tight px-2">

                    <span>él</span>
                    <span>ella</span>
                    <span>usted</span>

                </div>

            </div>

            <!-- ellos / ellas / ustedes -->
            <div class="
                py-8
                px-2
                flex
                items-center
                justify-center
                min-h-[140px]
                break-words leading-tight px-2
            ">

                <div id="p6" class="flex flex-col gap-1 
                break-words leading-tight px-2">

                    <span>ellos</span>
                    <span>ellas</span>
                    <span>ustedes</span>

                </div>

            </div>

    </div>

    <!-- Imperative  -->
    <div id="single-result" class="
                hidden
                w-full
                text-3xl
                text-center
                font-bold
                border-4
                border-black
                rounded-lg
                overflow-hidden
            ">
    </div>

    </div>

    <script type="module">

        import {
            Type, Tense, ALL_MAIN_TENSES,
        } from "./Data.js";

        import {
            VerbConjugator
        } from "./Verb.js";

        import { WordDataMap } from "./RegularVerbData.js";

        const conjugator = new VerbConjugator();


        const typeMap = {
            ar: Type.Ar,
            er: Type.Er,
            ir: Type.Ir
        };


        // 目前狀態
        let currentType = null;
        let currentWord = null;
        let currentTense = Tense.Present;


        // 六格初始顯示內容
        const defaultTemplates = [
            "yo",
            "tú",
            `<span>él</span><span>ella</span><span>usted</span>`,
            "nosotros",
            "vosotros",
            `<span>ellos</span><span>ellas</span><span>ustedes</span>`
        ];


        /**
         * 判斷是否為單欄格式
         */
        function isSingleColumnTense(tense) {
            return tense === Tense.Imperative;
        }

        function initTenseSelect() {
            const tenseSelect =
                document.getElementById("tense-select");

            tenseSelect.innerHTML = "";

            ALL_MAIN_TENSES.forEach(tense => {
                const option = document.createElement("option");

                option.value = tense;
                option.textContent = tense;

                tenseSelect.appendChild(option);
            });

            tenseSelect.value = currentTense;

            // 選擇不同時態時重新渲染
            tenseSelect.addEventListener("change", event => {
                selectTense(event.target.value);
            });
        }
        /**
         * 選取時態
         */
        function selectTense(tenseValue) {
            console.log("點擊時態：", tenseValue);

            currentTense = tenseValue;

            updateTenseUI();

            if (currentWord && currentType !== null) {
                renderConjugation(currentWord, currentType);
            }
        }


        /**
         * 更新時態按鈕樣式
         */
        function updateTenseUI() {
            const tenseSelect =
                document.getElementById("tense-select");

            if (tenseSelect) {
                tenseSelect.value = currentTense;
            }
        }


        /**
         * 重設變位結果顯示
         */
        function resetResult() {
            const normalResult =
                document.getElementById("normal-result");

            const singleResult =
                document.getElementById("single-result");


            normalResult.classList.remove("hidden");

            singleResult.classList.add("hidden");
            singleResult.innerHTML = "";


            document
                .getElementById("p3")
                .classList.add("flex-col", "gap-1");

            document
                .getElementById("p6")
                .classList.add("flex-col", "gap-1");


            for (let i = 1; i <= 6; i++) {
                document.getElementById(`p${i}`).innerHTML =
                    defaultTemplates[i - 1];
            }
        }


        /**
         * 回到初始狀態
         */
        function resetPage() {
            currentType = null;
            currentWord = null;
            currentTense = Tense.Present;

            document.getElementById("type-select").value = "";
            document.getElementById("tense-select").value =
                Tense.Present;

            const searchInput =
                document.getElementById("word-search");

            searchInput.value = "";
            searchInput.placeholder =
                "搜尋全部動詞或英文意思，例如 tomar、drink";

            document
                .getElementById("word-list-container")
                .classList.remove("hidden");

            document
                .getElementById("word-list")
                .innerHTML = "";

            document
                .getElementById("selected-word")
                .classList.add("hidden");

            resetResult();
        }

        /**
         * 渲染單字列表
         */
        function renderWordList(list, fallbackType = null) {
            const wordList = document.getElementById("word-list");
            wordList.innerHTML = "";

            list.forEach(item => {
                const itemType = item.type ?? fallbackType;

                const btn = document.createElement("button");

                btn.innerHTML = `
            <div class="font-bold">${item.voc}</div>
            <div class="text-sm text-gray-500">
                ${item.meaning ?? ""}
            </div>
        `;

                btn.className =
                    "px-4 py-2 border-2 border-black rounded hover:bg-gray-200 cursor-pointer";

                btn.onclick = () => {
                    currentType = itemType;
                    currentWord = item.voc;

                    updateTypeUI(itemType);
                    renderConjugation(item.voc, itemType);
                };

                wordList.appendChild(btn);
            });

            if (list.length === 0) {
                wordList.innerHTML = `
            <div class="col-span-3 py-6 text-gray-500 font-bold">
                找不到符合的單字
            </div>
        `;
            }
        }
        function updateTypeUI(type) {
            const typeKeyMap = {
                [Type.Ar]: "ar",
                [Type.Er]: "er",
                [Type.Ir]: "ir"
            };

            const selectedKey =
                typeKeyMap[type] ?? "";

            document.getElementById("type-select").value =
                selectedKey;
        }

        /**
         * 選擇 Ar / Er / Ir
         */
        function selectType(typeKey) {
            const type = typeMap[typeKey];

            if (type === undefined) {
                return;
            }

            currentType = type;
            currentWord = null;

            document.getElementById("type-select").value = typeKey;

            const searchInput =
                document.getElementById("word-search");

            searchInput.value = "";

            const list =
                WordDataMap.get(type) ?? [];

            const wordListContainer =
                document.getElementById("word-list-container");

            const selectedWord =
                document.getElementById("selected-word");

            wordListContainer.classList.remove("hidden");
            wordListContainer.scrollTop = 0;

            selectedWord.classList.add("hidden");

            resetResult();
            renderWordList(list, type);
        }

        /**
         * 渲染變位結果
         */
        function renderConjugation(word, type) {
            const result = conjugator.conjugate({
                word,
                tag: currentTense,
                type
            });


            console.log(result);


            document
                .getElementById("word-list-container")
                .classList.add("hidden");


            const selectedWord =
                document.getElementById("selected-word");

            selectedWord.classList.remove("hidden");


            const wordData =
                (WordDataMap.get(type) ?? [])
                    .find(item => item.voc === word);


            const meaning =
                wordData?.meaning ?? "";


            selectedWord.innerText =
                `${word} (${currentTense}) — ${meaning}`;


            const normalResult =
                document.getElementById("normal-result");

            const singleResult =
                document.getElementById("single-result");


            // 特殊單欄格式
            if (isSingleColumnTense(currentTense)) {
                normalResult.classList.add("hidden");

                singleResult.classList.remove("hidden");
                singleResult.innerHTML = "";


                // 只有 Imperative 顯示人稱
                const personal =
                    currentTense === Tense.Imperative
                        ? wordData?.personalImperative ?? []
                        : [];


                renderSingleColumnResult(result, personal);

                return;
            }


            // 一般六格格式
            normalResult.classList.remove("hidden");

            singleResult.classList.add("hidden");
            singleResult.innerHTML = "";


            document
                .getElementById("p3")
                .classList.remove("flex-col", "gap-1");

            document
                .getElementById("p6")
                .classList.remove("flex-col", "gap-1");


            for (let i = 0; i < 6; i++) {
                document.getElementById(`p${i + 1}`).innerHTML =
                    result[i] ?? "";
            }
        }


        /**
         * 渲染單欄結果
         */
        function renderSingleColumnResult(result, personal = []) {
            const singleResult =
                document.getElementById("single-result");


            const labelMap = {
                túNegativo: "tú (neg.)",
                vosotrosNegativo: "vosotros (neg.)"
            };


            const showPersonal =
                personal.length > 0;


            result.forEach((value, index) => {
                const row =
                    document.createElement("div");


                row.className = `
                min-h-[90px]
                px-4
                flex
                items-center
                font-bold
                `;
                row.style.fontSize = "clamp(1.2rem, 2.5vw, 2rem)";

                if (index < result.length - 1) {
                    row.classList.add(
                        "border-b-4",
                        "border-black"
                    );
                }


                if (showPersonal) {
                    const subject =
                        personal[index] ?? "";


                    row.classList.add(
                        "grid",
                        "grid-cols-[220px_1fr]"
                    );


                    row.innerHTML = `
                        <div class="text-gray-500 text-2xl text-left">
                            ${labelMap[subject] ?? subject}
                        </div>

                        <div class="text-center">
                            ${value ?? ""}
                        </div>
                    `;
                }
                else {
                    row.classList.add("justify-center");

                    row.innerText =
                        value ?? "";
                }


                singleResult.appendChild(row);
            });
        }


        /**
         * 搜尋輸入事件
         */
        document
            .getElementById("word-search")
            .addEventListener("input", event => {
                const keyword = event.target.value
                    .trim()
                    .toLowerCase();

                let searchList = [];

                if (currentType !== null) {
                    // 有選 Ar / Er / Ir：只搜尋目前類型
                    searchList = (WordDataMap.get(currentType) ?? [])
                        .map(item => ({
                            ...item,
                            type: currentType
                        }));
                }
                else {
                    // 沒有選類型：搜尋全部類型
                    [Type.Ar, Type.Er, Type.Ir].forEach(type => {
                        const list = WordDataMap.get(type) ?? [];

                        searchList.push(
                            ...list.map(item => ({
                                ...item,
                                type
                            }))
                        );
                    });
                }

                const filteredList = searchList.filter(item => {
                    const word = item.voc?.toLowerCase() ?? "";
                    const meaning = item.meaning?.toLowerCase() ?? "";

                    return word.includes(keyword) ||
                        meaning.includes(keyword);
                });

                currentWord = null;

                renderWordList(filteredList);

                document
                    .getElementById("word-list-container")
                    .classList.remove("hidden");

                document
                    .getElementById("selected-word")
                    .classList.add("hidden");

                resetResult();
            });

        // Type 下拉選單事件
        document
            .getElementById("type-select")
            .addEventListener("change", e => {
                const value = e.target.value;

                if (!value) {

                    resetPage();

                    return;
                }

                selectType(value);
            });
        // 初始化
        // initTenseButtons();
        initTenseSelect();
    </script>

</body>

</html>
