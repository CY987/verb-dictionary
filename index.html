<body class="bg-gray-50 min-h-screen flex flex-col items-center py-10">

    <div class="w-full max-w-xl bg-white p-6 rounded-xl shadow-md">

        <!-- 上方三顆按鈕 -->
        <div class="flex justify-between mb-8">
            <button onclick="selectType('ar')" class="border-4 border-black px-16 py-6 text-3xl">Ar</button>
            <button onclick="selectType('er')" class="border-4 border-black px-16 py-6 text-3xl">Er</button>
            <button onclick="selectType('ir')" class="border-4 border-black px-16 py-6 text-3xl">Ir</button>
        </div>

        <!-- 中間顯示區 -->
        <div class="border-4 border-black h-24 flex items-center justify-center mb-8">
            <div id="word-list" class="flex gap-4"></div>
            <div id="selected-word" class="hidden text-xl">顯示選取的單字</div>
        </div>

        <!-- 下方 1~6 結果 -->
        <div class="grid grid-cols-2 text-5xl text-center">
            <div class="border-r-4 border-black py-4">
                <div id="p1">1</div>
                <hr class="border-2 border-black my-4">
                <div id="p2">2</div>
                <hr class="border-2 border-black my-4">
                <div id="p3">3</div>
            </div>

            <div class="py-4">
                <div id="p4">4</div>
                <hr class="border-2 border-black my-4">
                <div id="p5">5</div>
                <hr class="border-2 border-black my-4">
                <div id="p6">6</div>
            </div>
        </div>

    </div>

    <script type="module">
        import { Type, Tense, WordDataMap } from "./Data.js";
        import { VerbConjugator } from "./Verb.js";

        const conjugator = new VerbConjugator();

        const typeMap = {
            ar: Type.Ar,
            er: Type.Er,
            ir: Type.Ir,
        };

        window.selectType = function (typeKey) {
            const type = typeMap[typeKey];
            const list = WordDataMap.get(type) ?? [];

            const wordList = document.getElementById("word-list");
            const selectedWord = document.getElementById("selected-word");

            wordList.innerHTML = "";
            wordList.classList.remove("hidden");
            selectedWord.classList.add("hidden");

            resetResult();

            list.forEach(item => {
                const btn = document.createElement("button");
                btn.innerText = item.voc;
                btn.className = "px-4 py-2 border rounded hover:bg-gray-100";
                btn.onclick = () => selectWord(item.voc, type);
                wordList.appendChild(btn);
            });
        };

        function selectWord(word, type) {
            const result = conjugator.conjugate({
                word,
                tag: Tense.Present,
                type,
            });

            document.getElementById("word-list").classList.add("hidden");

            const selectedWord = document.getElementById("selected-word");
            selectedWord.classList.remove("hidden");
            selectedWord.innerText = word;

            for (let i = 0; i < 6; i++) {
                document.getElementById(`p${i + 1}`).innerText = result[i] ?? "";
            }
        }

        function resetResult() {
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`p${i}`).innerText = i;
            }
        }
    </script>

</body>
